<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Subtext Private</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <main class="shell">
    <section class="hero">
      <p class="eyebrow">Private Tailnet Transcription</p>
      <h1>Subtext</h1>
      <p class="lede">Paste a media URL or upload a local file from your iPhone. Transcribe it, or download the original video straight to the device.</p>
    </section>

    <section id="service-meta-card" class="card meta-card hidden" aria-live="polite">
      <p id="service-meta-text" class="hint">Checking service status…</p>
    </section>

    <section class="card">
      <form id="transcribe-form" class="stack">
        <label class="field">
          <span>Shared key</span>
          <input id="api-key" type="password" placeholder="X-Subtext-Key" autocomplete="off" autocapitalize="off" spellcheck="false">
        </label>

        <label class="field">
          <span>Web URL</span>
          <input id="url-input" type="url" placeholder="https://youtube.com/watch?v=..." autocomplete="off" autocapitalize="off" spellcheck="false">
        </label>

        <p class="hint center-text">or</p>

        <label class="field">
          <span>Choose File (audio/video)</span>
          <input id="file-input" type="file" accept="audio/*,video/*,.wav,.m4a,.mp3,.aac,.flac,.ogg,.opus,.webm,.mp4,.mov,.m4v,.avi,.mkv">
        </label>

        <div class="button-row">
          <button id="submit-btn" class="button button-primary" type="submit">Transcribe</button>
          <button id="download-btn" class="button button-secondary" type="button">Download Video Only</button>
        </div>
      </form>
    </section>

    <section id="status-card" class="card hidden" aria-live="polite">
      <p id="status-text" class="status-text">Uploading...</p>
    </section>

    <section id="result-card" class="card hidden">
      <div class="result-meta">
        <span id="duration-pill" class="pill">Duration: 0.0s</span>
        <span id="latency-pill" class="pill">Latency: 0.0s</span>
      </div>
      <textarea id="transcript-output" readonly placeholder="Your transcript will appear here."></textarea>
      <div class="actions">
        <button id="copy-btn" class="button button-secondary" type="button">Copy</button>
      </div>
    </section>
  </main>

  <script src="/static/app.js"></script>
</body>
</html>
