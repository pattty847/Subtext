<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#080b10">
  <title>Subtext</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>

  <!-- ── Top bar ─────────────────────────────────────────────────── -->
  <header class="top-bar">
    <span class="top-bar-logo">Subtext</span>
    <div class="top-bar-right">
      <span class="service-dot" id="service-dot" title="Checking service…"></span>
      <button class="icon-btn" id="key-toggle-btn" aria-label="API key" title="API key">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="7.5" cy="15.5" r="5.5"/><path d="M21 2L13 10M15 4l2 2M11 12l2 2"/>
        </svg>
      </button>
    </div>
  </header>

  <!-- ── Key drawer ──────────────────────────────────────────────── -->
  <div class="key-drawer" id="key-drawer" aria-hidden="true">
    <div class="key-drawer-inner">
      <label class="key-label" for="api-key">Shared key</label>
      <div class="key-input-row">
        <input id="api-key" type="password" placeholder="X-Subtext-Key"
               autocomplete="off" autocapitalize="off" spellcheck="false">
        <button class="btn btn-sm btn-teal" id="key-save-btn">Save</button>
      </div>
    </div>
  </div>

  <!-- ── App shell ────────────────────────────────────────────────── -->
  <div class="app-shell">

    <!-- ── Page: Media ──────────────────────────────────────────── -->
    <section class="page active" id="page-media" role="main" aria-label="Media">

      <!-- Service status -->
      <div class="notice hidden" id="service-notice">
        <span id="service-notice-text">Checking service…</span>
      </div>

      <!-- Input card -->
      <div class="card">
        <form id="transcribe-form" class="form-stack" novalidate>
          <div class="field">
            <label class="field-label" for="url-input">URL</label>
            <input id="url-input" type="url"
                   placeholder="YouTube, Twitter, TikTok, anywhere…"
                   autocomplete="off" autocapitalize="off" spellcheck="false">
          </div>

          <div class="or-divider"><span>or</span></div>

          <div class="field">
            <label class="field-label" for="file-input">Local file</label>
            <label class="file-pick" id="file-pick-label">
              <input id="file-input" type="file"
                     accept="audio/*,video/*,.wav,.m4a,.mp3,.aac,.flac,.ogg,.opus,.webm,.mp4,.mov,.m4v,.avi,.mkv">
              <span id="file-pick-text">Choose audio or video…</span>
            </label>
          </div>

          <div class="action-row">
            <button id="submit-btn" class="btn btn-primary" type="submit">Transcribe</button>
            <button id="download-btn" class="btn btn-ghost" type="button">Download</button>
          </div>
        </form>
      </div>

      <!-- Status card -->
      <div class="card card-status hidden" id="status-card" aria-live="polite">
        <div class="status-row">
          <span class="pulse-ring"></span>
          <span id="status-text">Processing…</span>
        </div>
      </div>

      <!-- Result card -->
      <div class="card hidden" id="result-card">
        <div class="pill-row">
          <span class="pill" id="duration-pill">—</span>
          <span class="pill" id="latency-pill">—</span>
          <span class="pill pill-stream hidden" id="stream-status-pill">Streaming</span>
        </div>
        <div class="transcript-wrap">
          <textarea id="transcript-output" readonly
                    placeholder="Your transcript will appear here."></textarea>
          <span class="stream-cursor hidden" id="streaming-cursor">|</span>
        </div>
        <div class="stream-indicator hidden" id="stream-indicator">
          <span class="stream-dot"></span>
          <span id="stream-label">Transcribing…</span>
        </div>
        <div class="result-actions">
          <button id="copy-btn" class="btn btn-ghost">Copy</button>
          <button id="chat-ctx-btn" class="btn btn-teal">Chat about this →</button>
        </div>
      </div>

      <!-- Analysis card -->
      <div class="card hidden" id="analysis-card">
        <p class="card-eyebrow">Analyze transcript</p>
        <div class="form-stack">
          <div class="field">
            <label class="field-label" for="preset-select">Preset</label>
            <select id="preset-select"></select>
          </div>
          <div class="field">
            <label class="field-label" for="style-select">Style</label>
            <select id="style-select"></select>
          </div>
          <div class="field">
            <label class="field-label" for="analysis-model-select">Model</label>
            <select id="analysis-model-select"></select>
          </div>
          <div class="field hidden" id="custom-prompt-field">
            <label class="field-label" for="custom-prompt-input">Custom prompt</label>
            <textarea id="custom-prompt-input"
                      placeholder="e.g. Pull out the three funniest moments and explain why they work."></textarea>
          </div>
          <div class="action-row">
            <button id="analyze-btn" class="btn btn-primary">Analyze</button>
            <button id="clear-analysis-btn" class="btn btn-ghost">Clear</button>
          </div>
        </div>
      </div>

      <!-- Analysis results -->
      <div class="card hidden" id="analysis-result-card" aria-live="polite">
        <div class="pill-row" id="analysis-meta-row">
          <span class="pill" id="analysis-meta-pill">—</span>
        </div>
        <div id="analysis-digest" class="analysis-digest hidden"></div>
        <div id="analysis-items" class="analysis-items"></div>
      </div>

    </section><!-- /page-media -->

    <!-- ── Page: Chat ────────────────────────────────────────────── -->
    <section class="page" id="page-chat" role="main" aria-label="Chat" aria-hidden="true">

      <!-- Chat top controls -->
      <div class="chat-controls">
        <div class="chat-model-row">
          <label class="field-label sr-only" for="chat-model-select">Model</label>
          <select id="chat-model-select" class="chat-model-select"></select>
          <button class="btn btn-xs btn-ghost" id="chat-models-refresh" title="Refresh models">⟳</button>
        </div>
        <button class="btn btn-xs btn-ghost" id="clear-chat-btn" title="Clear chat">Clear</button>
      </div>

      <!-- Context badge (shown when transcript is loaded) -->
      <div class="context-bar hidden" id="context-bar">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
        <span id="context-label">Transcript loaded as context</span>
        <button class="context-clear-btn" id="clear-context-btn" aria-label="Remove context">✕</button>
      </div>

      <!-- Messages -->
      <div class="messages" id="messages" aria-live="polite" aria-atomic="false">
        <div class="welcome-msg" id="welcome-msg">
          <p class="welcome-title">Subtext Chat</p>
          <p class="welcome-body">Chat with a local model. Transcribe something on the Media tab, then tap <strong>Chat about this →</strong> to ask questions about it.</p>
        </div>
      </div>

      <!-- Input area -->
      <div class="chat-input-area">
        <div class="chat-input-row">
          <textarea id="chat-input" class="chat-textarea" placeholder="Message…" rows="1"
                    aria-label="Chat message"></textarea>
          <button id="send-btn" class="btn btn-send" aria-label="Send">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/>
            </svg>
          </button>
          <button id="stop-btn" class="btn btn-stop hidden" aria-label="Stop">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
              <rect x="4" y="4" width="16" height="16" rx="2"/>
            </svg>
          </button>
        </div>
      </div>

    </section><!-- /page-chat -->

  </div><!-- /app-shell -->

  <!-- ── Bottom nav ────────────────────────────────────────────────── -->
  <nav class="bottom-nav" aria-label="Main navigation">
    <button class="nav-btn active" id="nav-media" data-page="media" aria-current="page">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
        <rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/>
      </svg>
      <span>Media</span>
    </button>
    <button class="nav-btn" id="nav-chat" data-page="chat">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
      </svg>
      <span>Chat</span>
    </button>
  </nav>

  <script src="/static/app.js"></script>
</body>
</html>
